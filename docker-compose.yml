services:
  web:
    build: .
    command: >
      gunicorn backend.wsgi:application
      --bind 0.0.0.0:8000
      --workers 2
      --threads 2
      --timeout 120
      --graceful-timeout 30
      --max-requests 1000
      --max-requests-jitter 100
      --log-level info
    volumes:
    - /var/www/nearestate-media:/app/media
    - /var/www/nearestate-static:/app/static
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "127.0.0.1:8000:8000"

  celery:
    build: .
    command: celery -A backend worker -l info --concurrency=1
    volumes:
    - /var/www/nearestate-media:/app/media
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: nearestate
      POSTGRES_USER: nearestate
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always

volumes:
  postgres_data:

